apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - backend:5000

      - job_name: node-exporter
        static_configs:
          - targets:
              - node-exporter:9100

      - job_name: dcgm-exporter
        static_configs:
          - targets:
              - dcgm-exporter:9400

      - job_name: ollama-exporter
        static_configs:
          - targets:
              - ollama-exporter:9500
