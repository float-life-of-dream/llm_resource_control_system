apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-monitor-frontend
  labels:
    app: ai-monitor-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-monitor-frontend
  template:
    metadata:
      labels:
        app: ai-monitor-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: frontend
          image: ghcr.io/float-life-of-dream/ai-control-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
