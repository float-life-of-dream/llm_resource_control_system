apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-monitor-backend
  labels:
    app: ai-monitor-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-monitor-backend
  template:
    metadata:
      labels:
        app: ai-monitor-backend
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: backend
          image: ghcr.io/float-life-of-dream/ai-control-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: ai-monitor-config
            - secretRef:
                name: ai-monitor-secrets
