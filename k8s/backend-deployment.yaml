apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-monitor-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-monitor-backend
  template:
    metadata:
      labels:
        app: ai-monitor-backend
    spec:
      containers:
        - name: backend
          image: ai-monitor/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: ai-monitor-config
            - secretRef:
                name: ai-monitor-secrets
