services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
      PROMETHEUS_TIMEOUT: ${PROMETHEUS_TIMEOUT:-5}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ai_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-ai_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_monitor}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-ai_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_monitor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
