services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ai_monitor:ai_monitor@postgres:5432/ai_monitor}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080,http://localhost:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      BOOTSTRAP_DEFAULT_TENANT_NAME: ${BOOTSTRAP_DEFAULT_TENANT_NAME:-Default Tenant}
      BOOTSTRAP_DEFAULT_TENANT_SLUG: ${BOOTSTRAP_DEFAULT_TENANT_SLUG:-default}
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
      PROMETHEUS_TIMEOUT: ${PROMETHEUS_TIMEOUT:-5}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-ai_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-ai_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_monitor}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-ai_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_monitor}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
